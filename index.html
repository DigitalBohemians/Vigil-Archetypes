<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIGIL — Collector Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      background: #e8e0d8;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('72609DD2-64F2-4478-BE91-F7A7323A1B70.png');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(232, 222, 212, 0.50);
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 64px 40px 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 36px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.14);
      animation: fadeUp 1s ease 0.15s both;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.9rem, 5vw, 2.55rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #1e1a17;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 22px;
      animation: fadeUp 1s ease 0.28s both;
    }

    .body-text {
      font-size: 0.92rem;
      font-weight: 300;
      color: #2e2820;
      text-align: center;
      line-height: 1.75;
      margin-bottom: 6px;
      animation: fadeUp 1s ease 0.38s both;
    }

    .body-text em {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
    }

    .body-text-small {
      font-size: 0.88rem;
      font-weight: 300;
      color: #2e2820;
      text-align: center;
      line-height: 1.65;
      margin-bottom: 36px;
      animation: fadeUp 1s ease 0.46s both;
    }

    .form-wrap {
      width: 100%;
      animation: fadeUp 1s ease 0.58s both;
    }

    .form-wrap iframe {
      width: 100%;
      height: 320px;
      border: none;
      display: block;
    }

    .footer {
      margin-top: 24px;
      font-size: 0.72rem;
      font-weight: 300;
      color: #5a5048;
      text-align: center;
      line-height: 1.9;
      animation: fadeUp 1s ease 0.72s both;
    }

    .footer a {
      color: #5a5048;
      text-decoration: none;
      border-bottom: 1px solid rgba(90,80,72,0.3);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .container { padding: 48px 24px 60px; }
      .logo { width: 130px; height: 130px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="container">

    <img class="logo" src="72609DD2-64F2-4478-BE91-F7A7323A1B70.png" alt="Archetypes of Vigil" />

    <h1 class="title">VIGIL — Collector Access</h1>

    <p class="body-text">
      Join the private early access list for the release of<br>
      <em>Archetypes of Vigil.</em>
    </p>

    <p class="body-text-small">
      Limited edition pieces.<br>
      First access before public release.
    </p>

    <div class="form-wrap">
      <iframe
        src="https://tally.so/embed/EkP612?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        width="100%"
        height="320"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        title="VIGIL Collector Access"
        allowtransparency="true"
      ></iframe>
    </div>

    <div class="footer">
      By signing up you agree to receive emails about upcoming releases. Unsubscribe at any time.<br>
      Protected by reCAPTCHA &nbsp;·&nbsp;
      <a href="https://tally.so/privacy" target="_blank">Privacy</a>
      &nbsp;·&nbsp;
      <a href="https://tally.so/terms" target="_blank">Terms</a>
    </div>

  </div>

</body>
</html>
